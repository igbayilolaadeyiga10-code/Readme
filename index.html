<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarnHub</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{
background:white;
color:#065f46;
font-family:sans-serif;
margin:0;
}
.card{
background:#f0fdf4;
border:1px solid #22c55e;
border-radius:14px;
padding:16px;
margin-bottom:12px;
transition:0.2s;
}
.card:hover{transform:scale(1.02);}
.btn{
background:linear-gradient(45deg,#16a34a,#22c55e);
color:white;
padding:12px;
border-radius:10px;
font-weight:bold;
width:100%;
margin-top:6px;
border:none;
}
.input{
width:100%;
padding:10px;
border:1px solid #22c55e;
border-radius:10px;
margin-bottom:10px;
}
.navbar{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
border-top:1px solid #22c55e;
background:white;
padding:14px;
}
.active{color:#22c55e;font-weight:bold;}
.tapbtn{animation:pulse 1.5s infinite;}

.taskTabs{
display:flex;
justify-content:space-around;
margin-bottom:12px;
font-weight:bold;
}

.taskTab{
cursor:pointer;
padding:6px 12px;
}

.taskActive{
color:#22c55e;
border-bottom:2px solid #22c55e;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}
</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState,useEffect} = React;

function App(){

const tg = window.Telegram ? window.Telegram.WebApp : null;

useEffect(()=>{
if(tg){
tg.ready();
tg.expand();
}
},[]);

const userId = tg?.initDataUnsafe?.user?.id || Math.floor(Math.random()*999999);

const [tab,setTab] = useState("home");
const [taskTab,setTaskTab] = useState("telegram");

const [admin,setAdmin] = useState(false);
const [tap,setTap] = useState(0);

const [points,setPoints] = useState(parseInt(localStorage.getItem("points"))||0);
const [tasks,setTasks] = useState(JSON.parse(localStorage.getItem("tasks")||"[]"));
const [completedTasks,setCompletedTasks] = useState(JSON.parse(localStorage.getItem("completedTasks")||"[]"));
const [withdraws,setWithdraws] = useState(JSON.parse(localStorage.getItem("withdraws")||"[]"));

const [walletType,setWalletType] = useState(localStorage.getItem("walletType")||"");
const [walletNumber,setWalletNumber] = useState(localStorage.getItem("walletNumber")||"");
const [walletName,setWalletName] = useState(localStorage.getItem("walletName")||"");

const [refCount,setRefCount] = useState(parseInt(localStorage.getItem("refCount"))||0);

const refLink = window.location.origin + "?ref=" + userId;

function savePoints(p){
setPoints(p);
localStorage.setItem("points",p);
}

function logoTap(){
let newTap=tap+1;
setTap(newTap);
if(newTap>=20){
setAdmin(true);
setTap(0);
}
}

const REF_BONUS=100;

useEffect(()=>{

const params = new URLSearchParams(window.location.search);
const ref=params.get("ref");

if(ref && ref!=userId && !localStorage.getItem("refClaimed")){

savePoints(points+REF_BONUS);

let count=refCount+1;
setRefCount(count);
localStorage.setItem("refCount",count);

localStorage.setItem("refClaimed",true);

alert("🎉 Referral bonus ₦100 added!");

}

},[]);

function openTask(task){

if(completedTasks.includes(task.id)){
alert("Task already completed");
return;
}

window.open(task.link,"_blank");

alert("Complete task... reward in 4 seconds");

setTimeout(()=>{

savePoints(points+task.reward);

let updated=[...completedTasks,task.id];
setCompletedTasks(updated);
localStorage.setItem("completedTasks",JSON.stringify(updated));

alert("Task completed! +₦"+task.reward);

},4000);

}

function addTelegramTask(){
let title=prompt("Telegram Task Title");
let link=prompt("Telegram Link");
let reward=parseInt(prompt("Reward"));
if(!title||!link||!reward)return;

let newTask={id:Date.now(),title,link,reward,type:"telegram"};
let updated=[...tasks,newTask];

setTasks(updated);
localStorage.setItem("tasks",JSON.stringify(updated));
}

function addWhatsappTask(){
let title=prompt("WhatsApp Task Title");
let link=prompt("WhatsApp Link");
let reward=parseInt(prompt("Reward"));
if(!title||!link||!reward)return;

let newTask={id:Date.now(),title,link,reward,type:"whatsapp"};
let updated=[...tasks,newTask];

setTasks(updated);
localStorage.setItem("tasks",JSON.stringify(updated));
}

function dailyReward(){

let last=localStorage.getItem("dailyTime");
let now=Date.now();

if(last && now-last<86400000){
alert("Come back later for daily reward");
return;
}

savePoints(points+50);

localStorage.setItem("dailyTime",now);

alert("Daily reward ₦50 claimed!");

}

if(admin){
return(
<div className="p-4">
<h2 className="text-xl font-bold text-green-600 mb-3">Admin Panel</h2>

<button className="btn" onClick={addTelegramTask}>Add Telegram Task</button>
<button className="btn" onClick={addWhatsappTask}>Add WhatsApp Task</button>

<h3 className="text-green-600 font-bold mt-4">Manage Tasks</h3>

{tasks.map(t=>(
<div key={t.id} className="card">

<p>{t.title}</p>
<p>{t.type}</p>
<p>₦{t.reward}</p>

<button className="btn" onClick={()=>{

let title=prompt("Edit title",t.title);
let reward=prompt("Edit reward",t.reward);

t.title=title;
t.reward=parseInt(reward);

setTasks([...tasks]);
localStorage.setItem("tasks",JSON.stringify(tasks));

}}>Edit</button>

<button className="btn bg-red-500" onClick={()=>{

let updated=tasks.filter(task=>task.id!==t.id);

setTasks(updated);
localStorage.setItem("tasks",JSON.stringify(updated));

}}>Delete</button>

</div>
))}

<button className="btn bg-red-500" onClick={()=>setAdmin(false)}>Exit Admin</button>

</div>
)
}

return(

<div className="max-w-md mx-auto pb-28">

<header className="p-4 flex justify-between border-b border-green-500">
<h1 className="font-bold text-green-600 cursor-pointer" onClick={logoTap}>EarnHub</h1>
<div>@{userId}</div>
</header>

{tab==="home" &&(
<div className="p-4">

<div className="card text-center">
<p>Balance</p>
<h2 className="text-4xl text-green-600 font-bold">₦{points}</h2>
</div>

<div className="card text-center">
<p>Invited Friends</p>
<h2 className="text-2xl">{refCount}</h2>
</div>

<button className="btn tapbtn" onClick={()=>savePoints(points+5)}>Tap & Earn +5</button>
<button className="btn" onClick={dailyReward}>Claim Daily ₦50</button>

</div>
)}

{tab==="tasks" &&(
<div className="p-4">

<div className="taskTabs">
<div className={taskTab==="telegram"?"taskTab taskActive":"taskTab"} onClick={()=>setTaskTab("telegram")}>Telegram</div>
<div className={taskTab==="whatsapp"?"taskTab taskActive":"taskTab"} onClick={()=>setTaskTab("whatsapp")}>WhatsApp</div>
</div>

{tasks.filter(t=>t.type===taskTab).map(t=>(
<div key={t.id} className="card">
<p className="font-bold">{t.title}</p>
<p>Reward ₦{t.reward}</p>
<button className="btn" onClick={()=>openTask(t)}>Start Task</button>
</div>
))}

</div>
)}

{tab==="invite" &&(
<div className="p-4">
<div className="card text-center">
<p>Invite Friends</p>
<input className="input" value={refLink} readOnly/>
<button className="btn" onClick={()=>{navigator.clipboard.writeText(refLink);alert("Link copied")}}>Copy Invite Link</button>
</div>
</div>
)}

<nav className="navbar">
<div className={tab==="home"?"active":""} onClick={()=>setTab("home")}>Home</div>
<div className={tab==="tasks"?"active":""} onClick={()=>setTab("tasks")}>Tasks</div>
<div className={tab==="invite"?"active":""} onClick={()=>setTab("invite")}>Invite</div>
</nav>

</div>
)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
                </html>
