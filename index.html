.<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EarnHub</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
background:linear-gradient(180deg,#071b12,#03110a);
color:white;
font-family:sans-serif;
margin:0;
}

.card{
background:#0f2f22;
border-radius:16px;
padding:16px;
border:1px solid rgba(34,197,94,.3);
margin-bottom:12px;
}

.btn{
background:#22c55e;
padding:12px;
border-radius:10px;
font-weight:bold;
width:100%;
}

.input{
width:100%;
background:#02120a;
border:1px solid #22c55e;
padding:10px;
border-radius:10px;
}

.navbar{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#071b12;
border-top:1px solid #22c55e;
padding:14px;
}

.active{
color:#22c55e;
font-weight:bold;
}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState,useEffect}=React

const ADMIN_PIN="0000"
const DEV_PIN="1111"

function App(){

const tg=window.Telegram?.WebApp

const userId=tg?.initDataUnsafe?.user?.id || Math.floor(Math.random()*10000)

const [tab,setTab]=useState("dashboard")
const [points,setPoints]=useState(0)
const [admin,setAdmin]=useState(false)
const [dev,setDev]=useState(false)
const [lastClaim,setLastClaim]=useState(localStorage.getItem("daily")||0)

const DAILY_REWARD=5

const tasks=[
{
title:"Join Telegram Channel",
reward:5,
channel:"https://t.me/telegram"
},
{
title:"Join News Channel",
reward:5,
channel:"https://t.me/telegram"
}
]

const leaderboard=[
{user:"Alex",refs:40},
{user:"John",refs:30},
{user:"Mary",refs:25}
]

const earners=[
{user:"Alex",coins:200},
{user:"John",coins:180},
{user:"Mary",coins:150}
]

function claimDaily(){

const now=Date.now()

if(now-lastClaim<86400000){
alert("Already claimed today")
return
}

setPoints(points+DAILY_REWARD)

localStorage.setItem("daily",now)

setLastClaim(now)

alert("Daily reward received!")

}

function verifyTask(task){

setPoints(points+task.reward)

alert("Task verified +"+task.reward)

}

function openAdmin(){

let p=prompt("Admin PIN")

if(p===ADMIN_PIN){
setAdmin(true)
}else{
alert("Wrong PIN")
}

}

function openDev(){

let p=prompt("Dev PIN")

if(p===DEV_PIN){
setDev(true)
}else{
alert("Wrong PIN")
}

}

return(

<div className="max-w-md mx-auto pb-28">

<header className="p-4 flex justify-between border-b border-green-700">

<h1 className="text-green-400 font-bold">
EarnHub
</h1>

<div>@user{userId}</div>

</header>


{/* DASHBOARD */}

{tab==="dashboard" &&(

<div className="p-4">

<div className="card text-center">

<p>Balance</p>

<h2 className="text-3xl text-green-400 font-bold">
{points}
</h2>

</div>


<div className="card">

<button onClick={claimDaily} className="btn">
Claim Daily Bonus
</button>

</div>

<div className="card">

<h3 className="text-green-400 font-bold mb-2">
Tasks
</h3>

{tasks.map((t,i)=>(

<div key={i} className="mb-3">

<p>{t.title}</p>

<button
className="btn mt-1"
onClick={()=>{

window.open(t.channel)

setTimeout(()=>{
verifyTask(t)
},4000)

}}
>

Start Task (+{t.reward})

</button>

</div>

))}

</div>

</div>

)}

{/* INVITE */}

{tab==="invite" &&(

<div className="p-4">

<div className="card text-center">

<h3 className="text-green-400 font-bold">
Invite Friends
</h3>

<input
className="input mt-2"
value={`https://t.me/yourbot?start=${userId}`}
readOnly
/>

<button
className="btn mt-2"
onClick={()=>{

navigator.clipboard.writeText(`https://t.me/yourbot?start=${userId}`)

alert("Copied")

}}
>

Copy Invite Link

</button>

</div>

</div>

)}

{/* LEADERBOARD */}

{tab==="leaders" &&(

<div className="p-4">

<div className="card">

<h3 className="text-green-400 font-bold">
Referral Leaderboard
</h3>

{leaderboard.map((u,i)=>(

<div key={i} className="flex justify-between">

<p>#{i+1} {u.user}</p>
<p>{u.refs} refs</p>

</div>

))}

</div>

</div>

)}

{/* TOP EARNERS */}

{tab==="earners" &&(

<div className="p-4">

<div className="card">

<h3 className="text-green-400 font-bold">
Top Earners
</h3>

{earners.map((u,i)=>(

<div key={i} className="flex justify-between">

<p>#{i+1} {u.user}</p>
<p>{u.coins}</p>

</div>

))}

</div>

</div>

)}

{/* VAULT */}

{tab==="vault" &&(

<div className="p-4">

<div className="card">

<h3 className="text-green-400 font-bold">
Withdraw
</h3>

<input className="input mt-2" placeholder="Amount"/>

<select className="input mt-2">

<option>USDT TRC20</option>
<option>USDT BEP20</option>

</select>

<input className="input mt-2" placeholder="Wallet"/>

<button className="btn mt-2">
Submit
</button>

</div>

</div>

)}

{/* ADMIN PANEL */}

{admin &&(

<div className="fixed inset-0 bg-black p-6">

<div className="card">

<h2 className="text-green-400 font-bold">
Admin Panel
</h2>

<p>Total Users: 120</p>
<p>Total Tasks Done: 300</p>
<p>Total Withdrawals: 45</p>

<button
className="btn mt-2"
onClick={()=>setAdmin(false)}
>

Close

</button>

</div>

</div>

)}

{/* DEV PANEL */}

{dev &&(

<div className="fixed inset-0 bg-black p-6">

<div className="card">

<h2 className="text-green-400 font-bold">
Developer Panel
</h2>

<input className="input" placeholder="Bot Token"/>

<input className="input mt-2" placeholder="Database URL"/>

<button className="btn mt-2">
Save
</button>

<button
className="btn mt-2"
onClick={()=>setDev(false)}
>
Close
</button>

</div>

</div>

)}

{/* NAVBAR */}

<div className="navbar">

<button className={tab==="dashboard"?"active":""} onClick={()=>setTab("dashboard")}>Home</button>

<button className={tab==="invite"?"active":""} onClick={()=>setTab("invite")}>Invite</button>

<button className={tab==="leaders"?"active":""} onClick={()=>setTab("leaders")}>Leaders</button>

<button className={tab==="earners"?"active":""} onClick={()=>setTab("earners")}>Earners</button>

<button className={tab==="vault"?"active":""} onClick={()=>setTab("vault")}>Vault</button>

<button onClick={openAdmin}>Admin</button>

<button onClick={openDev}>Dev</button>

</div>

</div>

)

}

ReactDOM.render(<App/>,document.getElementById("root"))

</script>

</body>
    </html>
